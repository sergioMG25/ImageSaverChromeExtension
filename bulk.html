<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Descarga Masiva - Image Saver Pro</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { width: 100%; height: 100%; overflow: auto; padding: 20px; box-sizing: border-box; }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .image-card {
      position: relative;
      border: 2px solid transparent;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 1;
      cursor: pointer;
      transition: all 0.2s;
    }
    .image-card.selected {
      border-color: #38bdf8;
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.3);
    }
    .image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .image-card .check {
      position: absolute;
      top: 5px;
      right: 5px;
      background: #38bdf8;
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .image-card.selected .check {
      display: flex;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      position: sticky;
      top: 0;
      background: var(--bg-color);
      padding: 10px 0;
      z-index: 10;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 20px;
    }
    .toolbar button {
      width: auto;
      padding: 8px 16px;
    }
    #count {
      margin-left: auto;
      align-self: center;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="selectAll">Seleccionar Todo</button>
    <button id="downloadSelected">Descargar Seleccionados (0)</button>
    <span id="count">Buscando imágenes...</span>
  </div>
  <div id="gallery" class="gallery"></div>
  <script type="module" src="bulk.js"></script>
</body>
</html>
