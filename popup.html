<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Saver Pro</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Image Saver Pro</h1>
      </header>

      <div class="card">
      <div class="input-group">
        <label>Carpeta de Destino</label>
        <div style="display: flex; flex-direction: column; gap: 0.5rem; width: 100%;">
           <button id="selectFolderBtn" class="secondary-btn" style="background: transparent; border: 1px dashed var(--border-color); color: #94a3b8; width: 100%;">
             <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
             Seleccionar Carpeta...
           </button>
           <div id="currentFolderLabel" style="font-size: 0.75rem; color: #4ade80; text-align: center; display: none;">
             ✓ Usando: <span id="folderNameDisplay">Default</span>
           </div>
        </div>
      </div>
      
        <button id="captureBtn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
            ></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
          Capturar Pantalla
        </button>

      <div class="divider" style="margin: 0.5rem 0; border-top: 1px solid var(--border-color);"></div>

      <div class="tools-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
        <button id="bulkBtn" class="secondary-btn" style="background: transparent; border: 1px solid var(--border-color);">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
          Masiva
        </button>
        <button id="historyBtn" class="secondary-btn" style="background: transparent; border: 1px solid var(--border-color);">
           <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
           Historial
        </button>
      </div>
      
        <div id="status" class="status"></div>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
